<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>Untitled Document</title>
</head>

<body>
<form id="form1" name="form1" method="post" action="/rejectreason_submit">
  <p>&nbsp;</p>
  <table width="200" border="1">
    <tr>
      <td>Reason :</td>
      <td><label for="textfield"></label>
      <input type="text" name="textfield" id="textfield" /></td>
    </tr>
    <tr align="center">
      <td colspan="2"><input type="submit" name="button" id="button" value="Send" /></td>
    </tr>
  </table>
  <p>&nbsp;</p>
</form>

<script>
// Prevent going back to this page after form submission
if (window.history && window.history.pushState) {
    // Add current page to history
    window.history.pushState(null, null, window.location.href);

    // Listen for back/forward navigation
    window.onpopstate = function(event) {
        // Redirect to /rtohome when back button is pressed
        window.location.href = '/home';
    };
}
</script>
</body>
</html>
